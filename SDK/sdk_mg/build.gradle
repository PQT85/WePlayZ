ext {
    dagger2Version = '2.26'
    lifecycleVersion = '2.2.0'
}
dependencies {
    implementation fileTree(dir: 'libs', include: ['*.jar'])
    //implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:$kotlin_version"
//    implementation 'androidx.appcompat:appcompat:1.2.0'
//    implementation 'androidx.core:core-ktx:1.3.1'
//    testImplementation 'junit:junit:4.12'
//    androidTestImplementation 'androidx.test.ext:junit:1.1.2'
//    androidTestImplementation 'androidx.test.espresso:espresso-core:3.3.0'


  //  implementation "org.jetbrains.kotlin:kotlin-stdlib:$kotlin_version"

    // Adjust SDK
    implementation 'com.adjust.sdk:adjust-android:5.1.0'

    implementation 'com.android.installreferrer:installreferrer:2.2'
    implementation "com.adjust.sdk:adjust-android-huawei-referrer:5.0.0"

    //end adjust sdk

    implementation 'androidx.appcompat:appcompat:1.1.0'
    implementation 'androidx.core:core-ktx:1.9.0'
    implementation 'androidx.constraintlayout:constraintlayout:1.1.3'
    implementation 'com.google.android.material:material:1.1.0'



    testImplementation 'junit:junit:4.12'
    androidTestImplementation 'androidx.test.ext:junit:1.1.0'
    androidTestImplementation 'androidx.test.espresso:espresso-core:3.6.1'
    implementation   'com.squareup.okhttp3:okhttp:4.9.0'


    // Dagger
    implementation "com.google.dagger:dagger:$dagger2Version"
    implementation "com.google.dagger:dagger-android-support:$dagger2Version"
    annotationProcessor "com.google.dagger:dagger-compiler:$dagger2Version"
    annotationProcessor "com.google.dagger:dagger-android-processor:$dagger2Version"


    // Lifecycle
    implementation "androidx.lifecycle:lifecycle-extensions:$lifecycleVersion"
    annotationProcessor "androidx.lifecycle:lifecycle-compiler:$lifecycleVersion"

    // Gson
    implementation 'com.google.code.gson:gson:2.8.5'
    // Facebook SDK
    implementation 'com.facebook.android:facebook-android-sdk:18.0.0'
    // Google+ SDK
    implementation 'com.google.android.gms:play-services-auth:17.0.0'

    //songpq remove appsflyer
